name: Ingest Cron
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest
        run: |
          curl -s -X POST https://conflictradar.co/api/v1/admin/run-ingest \
            -H "x-internal-secret: ${{ secrets.INTERNAL_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 65 \
            --retry 0 \
            -w "\nHTTP %{http_code} in %{time_total}s\n" \
            -o /dev/null || echo "Ingest triggered (timeout is expected)"
        continue-on-error: true
