name: Ingest Cron
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest
        run: |
          curl -s -X POST https://conflictradar.co/api/v1/admin/run-ingest \
            -H "x-internal-secret: ${{ secrets.INTERNAL_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 90 \
            --retry 2 \
            --retry-delay 5 \
            -w "\nHTTP %{http_code}\n"
