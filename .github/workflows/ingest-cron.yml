name: Ingest Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger ingest
        run: |
          echo "Triggering ingest at $(date -u)"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://conflictradar.co/api/v1/admin/run-ingest \
            -H "x-internal-secret: ${{ secrets.INTERNAL_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 65 \
            --retry 0)
          echo "Response: HTTP $HTTP_CODE"
          # 200 or 504 (timeout) are both acceptable
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "504" ] || [ "$HTTP_CODE" = "0" ]; then
            echo "Ingest triggered successfully (or timed out as expected)"
          else
            echo "Warning: unexpected HTTP $HTTP_CODE"
          fi
        continue-on-error: true
